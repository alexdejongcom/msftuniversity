<head>

<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 32 32%27%3E%3Crect x=%272%27 y=%272%27 width=%2713%27 height=%2713%27 fill=%27%23f25022%27/%3E%3Crect x=%2717%27 y=%272%27 width=%2713%27 height=%2713%27 fill=%27%237fba00%27/%3E%3Crect x=%272%27 y=%2717%27 width=%2713%27 height=%2713%27 fill=%27%2300a4ef%27/%3E%3Crect x=%2717%27 y=%2717%27 width=%2713%27 height=%2713%27 fill=%27%23ffb900%27/%3E%3C/svg%3E">
<style>
  body {
    margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: #0067b8; color: #fff; font-family: "Segoe UI", -apple-system, sans-serif;
  }
  .box { max-width: 640px; padding: 32px; }
  .face { font-size: 110px; line-height: 1; }
  h1 { font-size: 24px; font-weight: 400; margin: 24px 0 8px; }
  p { font-size: 15px; opacity: .85; line-height: 1.6; }
  code { font-family: Consolas, monospace; background: rgba(255,255,255,.15); padding: 2px 8px; border-radius: 4px; }
  a { color: #fff; font-weight: 600; }
</style>
</head>
<body>
  <div class="box">
    <div class="face">:(</div>
    <h1>This page ran into a problem and needs to restart your navigation.</h1>
    <p>We're just collecting some error info, and then you can find your way back.<br><span id="pct">0</span>% complete</p>
    <p>Stop code: <code>PAGE_NOT_FOUND_404</code><br>
       What failed: <code>the-url-you-typed.sys</code></p>
    <p>Recommended fix: go to the <a href="index.html">homepage</a>, or check the <a href="resources.html">learning resources</a>.</p>
  </div>
  <script>
    var p = 0, t = setInterval(function () {
      p = Math.min(100, p + Math.floor(Math.random() * 14));
      document.getElementById("pct").textContent = p;
      if (p >= 100) clearInterval(t);
    }, 350);
  </script>
</body>
</html>
